name: Deploy via FTP

on:
  push:
    branches:
      - main

# Un solo deploy alla volta: se parte un nuovo push, l'eventuale run FTP ancora
# in corso viene annullata automaticamente. Evita che due run si contendano il
# server FTP (che accetta poche connessioni per volta) rallentandosi a vicenda.
concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      # Il server FTP scarta a intermittenza le connessioni dai runner GitHub
      # ("Timeout control socket"): ritentiamo in automatico fino a 3 volte
      # con attesa crescente, così il deploy si auto-risolve senza re-run manuali.
      # Connessione via FTPS esplicito senza verifica del certificato (ci si
      # collega per IP, il cert non combacia) — come fa FileZilla.
      - name: Deploy to FTP (tentativo 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: "60000"

      - name: Attesa prima del 2° tentativo
        if: steps.ftp1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to FTP (tentativo 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: "60000"

      - name: Attesa prima del 3° tentativo
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to FTP (tentativo 3)
        id: ftp3
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: "60000"

      - name: Attesa prima del tentativo finale
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure' && steps.ftp3.outcome == 'failure'
        run: sleep 90

      - name: Deploy to FTP (tentativo finale)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure' && steps.ftp3.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: "60000"

      # Carica anche il plugin WordPress headless (commenti REST + redirect + Open
      # Graph) direttamente nella cartella dei plugin del CMS. `state-name` usa un
      # file di stato separato per non confondersi con la sync del sito, e
      # `dangerous-clean-slate` ripulisce la cartella del plugin prima di caricare,
      # così sovrascrive eventuali file rotti da precedenti installazioni manuali.
      - name: Deploy plugin WordPress via FTP
        if: always()
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: ./wordpress-plugin/abilita-commenti-rest/
          server-dir: /public_html/cms/wp-content/plugins/abilita-commenti-rest/
          state-name: .ftp-deploy-plugin-state.json
          dangerous-clean-slate: true
          timeout: "60000"
