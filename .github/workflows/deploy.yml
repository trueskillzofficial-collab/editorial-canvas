name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Installa lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Il server (185.116.60.16) accetta le connessioni dei runner GitHub in modo
      # INTERMITTENTE (a volte va in "Timeout control socket"). Per questo usiamo
      # lftp — robusto sulle connessioni ballerine — e ripetiamo l'intera operazione
      # con nick-fields/retry fino a 5 volte: basta un momento "buono" del server.
      # Connessione via FTPS esplicito (ssl-force) senza verifica del certificato
      # (ci si collega per IP, il cert non combacia) — equivale a "security: loose".
      - name: Deploy sito via FTPS (con retry)
        uses: nick-fields/retry@v3
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        with:
          timeout_minutes: 6
          max_attempts: 5
          retry_wait_seconds: 30
          command: |
            lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'LFTP_EOF'
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            set ftp:passive-mode true
            set net:timeout 30
            set net:max-retries 3
            set net:reconnect-interval-base 5
            mirror -R --ignore-time --no-perms --verbose ./dist/ /public_html/
            bye
            LFTP_EOF

      # Carica anche il plugin WordPress headless (commenti REST + redirect + Open
      # Graph) nella cartella dei plugin del CMS. --delete ripulisce la cartella
      # (dedicata solo a questo plugin) da eventuali file rotti di installazioni
      # manuali precedenti. Gira sempre, anche se il deploy del sito ha avuto intoppi.
      - name: Deploy plugin WordPress via FTPS (con retry)
        if: always()
        uses: nick-fields/retry@v3
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        with:
          timeout_minutes: 4
          max_attempts: 5
          retry_wait_seconds: 30
          command: |
            lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<'LFTP_EOF'
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            set ftp:passive-mode true
            set net:timeout 30
            set net:max-retries 3
            set net:reconnect-interval-base 5
            mirror -R --delete --ignore-time --no-perms --verbose ./wordpress-plugin/abilita-commenti-rest/ /public_html/cms/wp-content/plugins/abilita-commenti-rest/
            bye
            LFTP_EOF
